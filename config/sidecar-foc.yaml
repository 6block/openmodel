# OpenModel — FOC (Filecoin Onchain Cloud) Test Configuration
# Models pulled from FOC, other settings inherited from prod-test
mode: prod

# Lotus daemon connection
lotus:
  api_url: "ws://localhost:1234/rpc/v0"
  api_token: "${LOTUS_API_TOKEN}"
  miner_address: "t0182063"
  poll_interval_sec: 15
  connect_timeout_sec: 10

# Curio DB — proof completion detection
curio:
  dsn: "host=localhost port=5433 user=yugabyte dbname=yugabyte sslmode=disable search_path=curio"
  proof_poll_interval_sec: 5
  proof_max_wait_sec: 1800
  log_path: "/tmp/curio.log"    # Curio log for fast WinningPoSt detection

# Yield-to-mining scheduler policy
scheduler:
  window_post:
    graceful_yield_threshold_sec: 300
    hard_stop_threshold_sec: 120
    resume_delay_after_close_sec: 60
    yield_during_fault_cutoff: false
    proof_detection_enabled: true

  winning_post:
    enabled: true
    resume_delay_sec: 30
    timeout_sec: 35

  fail_safe_on_disconnect: true

# gRPC communication
grpc:
  port: 50051
  max_message_size_mb: 4

# AI Inference engine — real vLLM, single GPU 0
inference:
  engine: "vllm"
  model: "Qwen/Qwen2.5-1.5B-Instruct"
  gpu_memory_utilization: 0.80
  max_model_len: 4096
  api_port: 8000

  multi_gpu:
    mode: "tensor_parallel"
    gpu_count: 1
    device_ids: [0]
    mock_gpu_count: 1

  multi_instance:
    load_balancer: "round_robin"

# FOC — real Filecoin Onchain Cloud
foc:
  backend: "real"
  real:
    bridge_url: "http://127.0.0.1:3100"
    piece_cid_registry:
      "Qwen/Qwen2.5-1.5B-Instruct":
        - "bafkzcibfqcaiaoqzo2usg7fuygpbshhavx224bcd7y2kcu6lwxkqsmvxxkaki33ueqgq"
        - "bafkzcibfqcaiaoqz3aydtkb3uk56bykmojrfmu4jtfapuh3cnwor54lltt5uo2e3smea"
        - "bafkzcibg7csmj3ibdff5c4ystkttul3w7xahpxtnzon5cjqof7bjpkc6ggk6q3ymm2ubq"

# Observability
metrics:
  port: 9090
  enabled: true

logging:
  level: "info"
  format: "text"
