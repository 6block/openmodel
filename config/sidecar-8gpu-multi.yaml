# OpenModel — Multi-GPU Test Configuration (multi_instance mode)
# Server: 8x RTX 3080, 8 independent engines, round-robin load balancing
# Best for: high-concurrency small model inference, all 8 GPUs yield together for WindowPoSt
mode: prod

# Lotus daemon (full node) connection
lotus:
  api_url: "ws://localhost:1234/rpc/v0"
  api_token: "${LOTUS_API_TOKEN}"
  miner_address: "t0182063"
  poll_interval_sec: 15
  connect_timeout_sec: 10

# Curio DB (YugabyteDB) — proof completion detection
curio:
  dsn: "host=localhost port=5433 user=yugabyte dbname=yugabyte sslmode=disable search_path=curio"
  proof_poll_interval_sec: 5
  proof_max_wait_sec: 1800
  log_path: "/tmp/curio.log"

# Yield-to-mining scheduler policy
scheduler:
  window_post:
    graceful_yield_threshold_sec: 300
    hard_stop_threshold_sec: 120
    resume_delay_after_close_sec: 60
    yield_during_fault_cutoff: false
    proof_detection_enabled: true

  winning_post:
    enabled: true
    resume_delay_sec: 30
    timeout_sec: 35

  fail_safe_on_disconnect: true

# gRPC communication
grpc:
  port: 50051
  max_message_size_mb: 4

# AI Inference engine — 8 independent vLLM instances, one per GPU
inference:
  engine: "vllm"
  model: "Qwen/Qwen2.5-3B-Instruct"
  gpu_memory_utilization: 0.80
  max_model_len: 4096
  api_port: 8000

  multi_gpu:
    mode: "multi_instance"
    device_ids: [0, 1, 2, 3, 4, 5, 6, 7]

  multi_instance:
    load_balancer: "round_robin"

# FOC — mock
foc:
  backend: "mock"
  mock:
    model_registry: {}
    simulate_delay: false

# Observability
metrics:
  port: 9090
  enabled: true

logging:
  level: "info"
  format: "text"
